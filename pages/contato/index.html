    <header>
        <nav class="container">
            <div class="logo">
                <img src="../../assets/img/logop_Sfundo.png" alt="S.P. Tech Solutions Logo" class="logo-img">
                <span class="logo-text">S.P. <small>TECH SOLUTIONS</small></span>
            </div>
            <ul class="nav-links">
                <li><a href="../../index.html" class="active">Home</a></li>
                <li><a href="../sobre/index.html">Sobre</a></li>
                <li><a href="../servicos/index.html">Serviços</a></li>
                <li><a href="../contato/index.html">Contato</a></li>
                <li><a href="../personalizacao/index.html">Personalização</a></li>
            </ul>
        </nav>
    </header>

    <main class="container contato-container">
    <div class="contato-wrapper">
        
        <div class="contato-info">
            <h1>Vamos tomar um <span class="highlight">café virtual?</span></h1>
            <p class="subtitle">Explique sua ideia e eu te ajudo a transformá-la em código.</p>
            
            <div class="info-links">
                <a href="sergiopaulo.almeida04@gmail.com" class="info-item">
                    <span class="icon">📧</span>
                    <div class="text">
                        <small>E-mail</small>
                        <p>sergiopaulo.almeida04@gmail.com</p>
                    </div>
                </a>

                <a href="https://wa.me/5511980177729" target="_blank" class="info-item">
                    <span class="icon">📱</span>
                    <div class="text">
                        <small>WhatsApp</small>
                        <p>(11) 98017-7729</p>
                    </div>
                </a>
            </div>
        </div>

        <form class="contato-form">
            <div class="input-group">
                <label>Seu Nome</label>
                <input type="text" placeholder="Ex: Sérgio Almeida" required>
            </div>
            
            <div class="input-group">
                <label>E-mail ou WhatsApp</label>
                <input type="text" placeholder="Como prefere ser contatado?" required>
            </div>
            
            <div class="input-group">
                <label>Sua Mensagem</label>
                <textarea rows="5" placeholder="Conte um pouco sobre seu projeto..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Enviar Mensagem</button>
        </form>

    </div>
</main>
